name: Deploy Webserver to Vultr

on:
  workflow_dispatch:
  push:
    paths:
      - 'webserver/**'
      - 'web-frontend/**'
      - '.github/workflows/webserver.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Vultr
        uses: appleboy/ssh-action@v1
        env:
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          METRICS_API_KEY: ${{ secrets.METRICS_API_KEY }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          CADDY_HOSTNAME: ${{ secrets.CADDY_HOSTNAME }}
          CADDY_ACME_EMAIL: ${{ secrets.CADDY_ACME_EMAIL }}
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_REF: ${{ github.ref }}
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH }}
          envs: DB_USERNAME,DB_PASSWORD,DB_DATABASE,JWT_SECRET,CORS_ORIGIN,METRICS_API_KEY,GRAFANA_ADMIN_PASSWORD,CADDY_HOSTNAME,CADDY_ACME_EMAIL,DEPLOY_SHA,DEPLOY_REF
          script: |
            set -euo pipefail

            REPO_URL="https://github.com/${{ github.repository }}.git"
            APP_DIR="$HOME/app"

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            echo "Deploying ref=$DEPLOY_REF sha=$DEPLOY_SHA"
            git fetch origin "$DEPLOY_SHA"
            git reset --hard "$DEPLOY_SHA"

            cd webserver

            : "${DB_USERNAME:?DB_USERNAME secret is required}"
            : "${DB_PASSWORD:?DB_PASSWORD secret is required}"
            : "${DB_DATABASE:?DB_DATABASE secret is required}"
            : "${JWT_SECRET:?JWT_SECRET secret is required}"
            : "${CORS_ORIGIN:?CORS_ORIGIN secret is required}"
            : "${METRICS_API_KEY:?METRICS_API_KEY secret is required}"
            : "${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD secret is required}"
            : "${CADDY_HOSTNAME:?CADDY_HOSTNAME secret is required}"
            : "${CADDY_ACME_EMAIL:?CADDY_ACME_EMAIL secret is required}"

            umask 077
            cat > .env << EOF
            PORT=3000
            HOST_PORT=80
            NODE_ENV=production

            DB_HOST=postgres
            DB_PORT=5432
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            DB_DATABASE=${DB_DATABASE}

            JWT_SECRET=${JWT_SECRET}
            JWT_ACCESS_EXPIRATION=3600
            JWT_REFRESH_EXPIRATION=2592000

            THROTTLE_TTL=60000
            THROTTLE_LIMIT=100

            CORS_ORIGIN=${CORS_ORIGIN}

            LOG_LEVEL=info
            DB_SLOW_QUERY_MS=500

            METRICS_API_KEY=${METRICS_API_KEY}
            GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}

            CADDY_HOSTNAME=${CADDY_HOSTNAME}
            CADDY_ACME_EMAIL=${CADDY_ACME_EMAIL}
            EOF
            chmod 600 .env

            COMPOSE="docker compose -p honeypot -f docker-compose.yml -f docker-compose.prod.yml"

            $COMPOSE pull --ignore-buildable
            $COMPOSE build --pull
            $COMPOSE down --remove-orphans
            $COMPOSE up -d

            docker image prune -f
