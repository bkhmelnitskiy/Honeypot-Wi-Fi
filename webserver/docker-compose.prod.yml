services:
  api:
    build:
      context: .
      target: prod
    command: ["node", "dist/main"]
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:${PORT:-3000}/api/v1 >/dev/null 2>&1 || exit 0']
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      CADDY_HOSTNAME: ${CADDY_HOSTNAME}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL}
    depends_on:
      frontend:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M

  frontend:
    build:
      context: ../web-frontend
      target: prod
    expose:
      - '80'
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost/ 2>&1 | grep -q "200 OK" || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M

  prometheus:
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=5GB'
      - '--web.external-url=http://localhost:9090'
    security_opt:
      - no-new-privileges:true

  loki:
    security_opt:
      - no-new-privileges:true

  promtail:
    security_opt:
      - no-new-privileges:true

  grafana:
    ports:
      - '127.0.0.1:3333:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_SECURITY_DISABLE_GRAVATAR: 'true'
      GF_SECURITY_COOKIE_SECURE: 'true'
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: 'true'
    security_opt:
      - no-new-privileges:true
